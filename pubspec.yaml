name: orda
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  equatable: ^2.0.8
  iconsax_flutter: ^1.0.1
  flutter_bloc: ^9.1.1
  supabase_flutter: ^2.12.2
  fpdart: ^1.2.0
  google_fonts: ^8.0.2
  get_it: ^9.2.1
  skeletonizer: ^2.1.3
  scrollable_positioned_list: ^0.3.8
  dropdown_button2: ^3.0.0
  go_router: ^17.2.0
  mobile_scanner: ^7.2.0
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  path_provider: ^2.1.5
  flutter_dotenv: ^6.0.0
  popover: ^0.4.0
  app_links: ^7.0.0
  firebase_messaging: ^16.1.3
  firebase_core: ^4.6.0
  fl_chart: ^1.2.0

dev_dependencies:
  build_runner:
  flutter_gen_runner:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  very_good_analysis: ^10.2.0

flutter_gen:
  output: lib/config/gen/
  line_length: 80
  integrations:
    flutter_svg: true

flutter:
  uses-material-design: true

  assets:
    - .local.env
    - assets/images/
